<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Matrix Viewer - SAM_</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' };
    </script>
    <style>
        body { background-color: #000000; color: #ffffff; margin: 0; overflow: hidden; font-family: sans-serif; user-select: none; }
        .font-console { font-family: monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 3px; }
        .panel-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex flex-col h-screen relative">

    <div class="h-14 bg-[#0a0a0a] border-b border-neutral-900 flex items-center justify-between px-4 md:px-6 shrink-0 shadow-[0_4px_20px_rgba(0,0,0,0.8)] z-50 relative">
        
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded bg-cyan-500/10 flex items-center justify-center border border-cyan-500/30 shadow-[0_0_10px_rgba(6,182,212,0.2)]">
                <i class="fa-solid fa-border-all text-cyan-500"></i>
            </div>
            <div class="hidden md:block">
                <h2 class="text-white font-bold tracking-widest text-[13px] leading-tight drop-shadow-md">CCTV MATRIX</h2>
                <p class="text-cyan-600 font-console text-[9px] uppercase tracking-widest">Surveillance VMS</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-4 bg-[#0f0f0f] px-3 py-1.5 rounded-md border border-neutral-800">
            <div class="flex items-center gap-1 border-r border-neutral-800 pr-3 mr-1">
                <button id="btn-prev" onclick="cambiarPagina(-1)" class="w-7 h-7 rounded text-gray-400 hover:text-cyan-400 hover:bg-cyan-500/10 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Cámaras Anteriores">
                    <i class="fa-solid fa-chevron-left text-[11px]"></i>
                </button>
                <div class="bg-black border border-neutral-800 px-2 py-0.5 rounded text-center min-w-[50px] shadow-inner">
                    <span id="page-indicator" class="text-[10px] font-console font-bold text-cyan-500 tracking-widest">1/2</span>
                </div>
                <button id="btn-next" onclick="cambiarPagina(1)" class="w-7 h-7 rounded text-gray-400 hover:text-cyan-400 hover:bg-cyan-500/10 transition-colors disabled:opacity-30 disabled:cursor-not-allowed" title="Siguientes Cámaras">
                    <i class="fa-solid fa-chevron-right text-[11px]"></i>
                </button>
            </div>

            <div class="flex items-center gap-1 border-r border-neutral-800 pr-3 mr-1">
                <button onclick="controlGlobal(false)" class="w-7 h-7 rounded text-amber-500 hover:bg-amber-500/10 transition-colors" title="Pausar Todas las señales">
                    <i class="fa-solid fa-pause text-[11px]"></i>
                </button>
                <button onclick="controlGlobal(true)" class="w-7 h-7 rounded text-green-500 hover:bg-green-500/10 transition-colors" title="Reproducir Todas las señales">
                    <i class="fa-solid fa-play text-[11px]"></i>
                </button>
                <button onclick="refreshStreams()" class="w-7 h-7 rounded text-blue-400 hover:bg-blue-400/10 transition-colors ml-1" title="Recargar Conexiones">
                    <i id="icon-refresh" class="fa-solid fa-rotate-right text-[11px]"></i>
                </button>
            </div>

            <div class="flex items-center gap-2">
                <i class="fa-solid fa-table-cells-large text-gray-500 text-[10px]"></i>
                <select id="cctv-grid-selector" onchange="cambiarGrilla(this.value)" class="bg-transparent text-gray-300 text-[10px] md:text-[11px] font-bold font-console outline-none cursor-pointer uppercase tracking-wider appearance-none">
                    <option value="1" class="bg-[#121212]">Focus 1x1</option>
                    <option value="4" class="bg-[#121212]">Quad 2x2</option>
                    <option value="6" class="bg-[#121212]">Hexa 3x2</option>
                    <option value="12" selected class="bg-[#121212]">Matrix 4x3</option>
                </select>
            </div>
        </div>
        
        <div>
            <button onclick="toggleSidePanel()" class="w-9 h-9 rounded bg-[#121212] border border-neutral-800 text-cyan-500 hover:bg-neutral-800 hover:border-cyan-500/50 transition-all flex items-center justify-center shadow-sm" title="Abrir Inventario de Cámaras">
                <i class="fa-solid fa-bars text-[14px]"></i>
            </button>
        </div>
    </div>

    <div id="cctv-grid-container" class="flex-1 p-1 md:p-1.5 grid gap-1 md:gap-1.5 bg-[#000000] overflow-hidden">
        </div>

    <div id="side-panel-cameras" class="fixed top-14 right-0 bottom-0 w-72 bg-[#0a0a0a] border-l border-neutral-900 z-40 transform translate-x-full panel-transition shadow-[-5px_0_20px_rgba(0,0,0,0.8)] flex flex-col">
        <div class="p-3 border-b border-neutral-800 bg-[#121212] flex justify-between items-center">
            <h3 class="text-gray-300 font-bold text-[11px] uppercase tracking-widest"><i class="fa-solid fa-network-wired text-cyan-500 mr-2"></i> Directorio CCTV</h3>
            <span id="total-cams-badge" class="bg-cyan-500/10 text-cyan-500 text-[10px] font-bold font-console px-2 py-0.5 rounded border border-cyan-500/30 shadow-sm">0</span>
        </div>
        <div id="camera-list-container" class="flex-1 overflow-y-auto p-2 space-y-1">
            </div>
    </div>

    <script>
        // ESTADO GLOBAL DE LA MATRIZ
        let multiViewPlayers = [];
        let dataCCTVGlobal = JSON.parse(localStorage.getItem('sam_cctv_data') || '[]');
        let currentPage = 0;
        let currentSlots = 12;
        let isPanelOpen = false;

        window.onload = () => {
            renderizarListaLateral();
            cambiarGrilla(12); // Inicia en modo 4x3
        };

        // ==========================================
        // LÓGICA DE PAGINACIÓN Y GRID
        // ==========================================
        function cambiarGrilla(slots) {
            currentSlots = parseInt(slots);
            currentPage = 0; 
            renderizarGridMatrix();
        }

        function cambiarPagina(direccion) {
            let maxPages = Math.ceil(dataCCTVGlobal.length / currentSlots);
            currentPage += direccion;
            if (currentPage < 0) currentPage = 0;
            if (currentPage >= maxPages) currentPage = maxPages - 1;
            renderizarGridMatrix();
        }

        function actualizarControlesPaginacion() {
            let maxPages = Math.ceil(dataCCTVGlobal.length / currentSlots) || 1;
            document.getElementById('page-indicator').innerText = `${currentPage + 1}/${maxPages}`;
            document.getElementById('btn-prev').disabled = (currentPage === 0);
            document.getElementById('btn-next').disabled = (currentPage >= maxPages - 1);
        }

        function renderizarGridMatrix() {
            destruirPlayersMatrix();
            actualizarControlesPaginacion();

            const container = document.getElementById('cctv-grid-container');
            container.className = 'flex-1 p-1 md:p-1.5 grid gap-1 md:gap-1.5 bg-[#000000] overflow-hidden';
            
            if(currentSlots === 1) container.classList.add('grid-cols-1', 'grid-rows-1');
            else if(currentSlots === 4) container.classList.add('grid-cols-2', 'grid-rows-2');
            else if(currentSlots === 6) container.classList.add('grid-cols-3', 'grid-rows-2');
            else if(currentSlots === 12) container.classList.add('grid-cols-2', 'md:grid-cols-4', 'grid-rows-6', 'md:grid-rows-3'); 

            let htmlCeldas = '';
            let startIndex = currentPage * currentSlots;

            for (let i = 0; i < currentSlots; i++) {
                let globalIndex = startIndex + i;
                let cam = dataCCTVGlobal[globalIndex]; 
                let hasCam = !!cam;

                htmlCeldas += `
                <div class="relative bg-[#050505] border border-neutral-900 flex items-center justify-center group overflow-hidden rounded-sm shadow-inner cursor-pointer transition-all" 
                     onclick="interaccionVideo(event, 'matrix-vid-${i}', ${i})" 
                     ondblclick="toggleFullScreen('wrapper-${i}')"
                     id="wrapper-${i}">
                    
                    ${hasCam ? `
                        <video id="matrix-vid-${i}" class="w-full h-full object-cover transition-opacity duration-300 opacity-100" muted playsinline></video>
                        
                        <div id="offline-${i}" class="absolute inset-0 bg-[#0a0a0a]/90 flex flex-col items-center justify-center hidden z-10">
                            <i class="fa-solid fa-video-slash text-red-500 text-2xl md:text-3xl mb-2 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]"></i>
                            <span class="font-console text-[9px] md:text-[10px] tracking-widest text-red-400 font-bold uppercase bg-red-950/30 px-2 py-1 rounded border border-red-900/50">Señal Perdida</span>
                        </div>

                        <div id="status-${i}" class="absolute top-2 right-2 flex items-center gap-1.5 bg-black/70 px-1.5 py-0.5 rounded border border-neutral-700 backdrop-blur-sm transition-colors z-20">
                            <span id="dot-${i}" class="w-1.5 h-1.5 rounded-full bg-amber-500 animate-pulse shadow-[0_0_5px_rgba(245,158,11,0.8)]"></span>
                            <span id="txt-${i}" class="text-[8px] font-console text-gray-200 tracking-widest uppercase">CONECTANDO...</span>
                        </div>

                        <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-[#0a0a0a] via-[#0a0a0a]/90 to-transparent pt-12 pb-2 px-3 translate-y-[110%] group-hover:translate-y-0 transition-transform duration-300 border-b-[3px] border-cyan-500 z-20">
                            <div class="flex justify-between items-end">
                                <div class="flex-1 pr-2 overflow-hidden">
                                    <span class="text-white font-bold font-sans text-[10px] md:text-[11px] uppercase block truncate leading-tight drop-shadow-md">${cam.ubicacion}</span>
                                    <span class="text-cyan-500 font-console text-[8px] md:text-[9px] uppercase block truncate mt-0.5"><i class="fa-solid fa-location-crosshairs"></i> ${cam.distrito}</span>
                                </div>
                                
                                <div class="flex flex-col items-end gap-1.5 shrink-0">
                                    <span class="text-gray-400 font-console text-[8px] font-bold tracking-widest bg-black/60 px-1.5 py-0.5 rounded border border-neutral-800">CH-${String(globalIndex+1).padStart(2, '0')}</span>
                                    
                                    <div class="flex items-center gap-1.5">
                                        <button onclick="event.stopPropagation(); togglePlayPause('matrix-vid-${i}')" class="w-6 h-6 md:w-7 md:h-7 rounded bg-black/80 border border-neutral-600 text-white hover:text-cyan-400 hover:border-cyan-500 hover:bg-[#1a1a1a] transition-all flex items-center justify-center shadow-md" title="Pausar / Reproducir">
                                            <i id="btn-icon-${i}" class="fa-solid fa-pause text-[10px] md:text-[11px]"></i>
                                        </button>
                                        <button onclick="event.stopPropagation(); toggleFullScreen('wrapper-${i}')" class="w-6 h-6 md:w-7 md:h-7 rounded bg-black/80 border border-neutral-600 text-white hover:text-cyan-400 hover:border-cyan-500 hover:bg-[#1a1a1a] transition-all flex items-center justify-center shadow-md" title="Pantalla Completa">
                                            <i class="fa-solid fa-expand text-[10px] md:text-[11px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    ` : `
                        <div class="flex flex-col items-center opacity-10 pointer-events-none">
                            <i class="fa-solid fa-satellite-dish text-2xl md:text-3xl mb-2 text-gray-500"></i>
                            <span class="font-console text-[9px] md:text-[10px] tracking-widest text-gray-400">SLOT DISPONIBLE</span>
                        </div>
                    `}
                </div>`;
            }

            container.innerHTML = htmlCeldas;

            // Iniciar streams con leve retraso
            setTimeout(() => {
                for (let i = 0; i < currentSlots; i++) {
                    let globalIndex = startIndex + i;
                    if (dataCCTVGlobal[globalIndex] && dataCCTVGlobal[globalIndex].url) {
                        conectarStreamMatrix(`matrix-vid-${i}`, dataCCTVGlobal[globalIndex].url, i);
                    }
                }
            }, 100);
        }

        // ==========================================
        // BOTÓN REFRESH Y CONTROL GLOBAL
        // ==========================================
        function refreshStreams() {
            let icon = document.getElementById('icon-refresh');
            if(icon) icon.classList.add('fa-spin');
            
            renderizarGridMatrix();
            
            setTimeout(() => {
                if(icon) icon.classList.remove('fa-spin');
            }, 800);
        }

        function controlGlobal(play) {
            let videos = document.querySelectorAll('video');
            videos.forEach(vid => {
                if (play) {
                    vid.play().catch(()=>{});
                } else {
                    vid.pause();
                }
            });
        }

        function togglePlayPause(vidId) {
            let video = document.getElementById(vidId);
            if (video) {
                if (video.paused) video.play().catch(()=>{});
                else video.pause();
            }
        }

        // ==========================================
        // MOTOR HLS (TOLERANCIA A ERRORES Y ANTISPAM)
        // ==========================================
        function destruirPlayersMatrix() {
            multiViewPlayers.forEach(player => { if (player) player.destroy(); });
            multiViewPlayers = [];
            document.getElementById('cctv-grid-container').innerHTML = ''; 
        }

        function conectarStreamMatrix(vidId, url, index) {
            let video = document.getElementById(vidId);
            if (!video) return;

            if (Hls.isSupported()) {
                let hls = new Hls({ 
                    maxBufferSize: 0, 
                    maxBufferLength: 4, 
                    liveSyncDurationCount: 3, 
                    enableWorker: true,
                    manifestLoadingMaxRetry: 1, 
                    manifestLoadingTimeOut: 5000, 
                    levelLoadingMaxRetry: 1,
                    fragLoadingMaxRetry: 1
                });
                
                multiViewPlayers[index] = hls;

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                marcarCamaraOffline(index);
                                hls.destroy(); 
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                marcarCamaraOffline(index);
                                hls.destroy();
                                break;
                        }
                    }
                });

                hls.loadSource(url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(()=>{});
                    vincularEventosVideo(video, index);
                });
                
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('error', () => { marcarCamaraOffline(index); });
                video.addEventListener('loadedmetadata', () => {
                    video.play().catch(()=>{});
                    vincularEventosVideo(video, index);
                });
            }
        }

        function marcarCamaraOffline(index) {
            let vid = document.getElementById(`matrix-vid-${index}`);
            let overlay = document.getElementById(`offline-${index}`);
            let stat = document.getElementById(`status-${index}`);
            let dot = document.getElementById(`dot-${index}`);
            let txt = document.getElementById(`txt-${index}`);

            if(vid) vid.classList.add('opacity-0'); 
            if(overlay) overlay.classList.remove('hidden'); 

            if(stat && dot && txt) {
                dot.className = "w-1.5 h-1.5 rounded-full bg-red-600";
                txt.innerText = "OFFLINE";
                txt.classList.add('text-red-400');
                stat.classList.remove('border-neutral-700', 'bg-black/70');
                stat.classList.add('border-red-900/50', 'bg-red-950/40');
            }
        }

        function vincularEventosVideo(video, index) {
            video.addEventListener('pause', () => actualizarBadgeUI(index, false));
            video.addEventListener('play', () => actualizarBadgeUI(index, true));
        }

        function actualizarBadgeUI(index, isPlaying) {
            let overlay = document.getElementById(`offline-${index}`);
            if(overlay && !overlay.classList.contains('hidden')) return;

            let stat = document.getElementById(`status-${index}`);
            let dot = document.getElementById(`dot-${index}`);
            let txt = document.getElementById(`txt-${index}`);
            let btnIcon = document.getElementById(`btn-icon-${index}`);

            if(!stat || !dot || !txt) return;

            if (isPlaying) {
                dot.className = "w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_5px_rgba(239,68,68,0.8)]";
                txt.innerText = "LIVE";
                stat.classList.remove('border-amber-500/50');
                stat.classList.add('border-neutral-700');
                if(btnIcon) btnIcon.className = "fa-solid fa-pause text-[10px] md:text-[11px]";
            } else {
                dot.className = "w-1.5 h-1.5 rounded-full bg-amber-500";
                txt.innerText = "PAUSED";
                stat.classList.remove('border-neutral-700');
                stat.classList.add('border-amber-500/50');
                // Al pausar, el icono se vuelve Play (y lo movemos un pelín para que quede centrado)
                if(btnIcon) btnIcon.className = "fa-solid fa-play text-[10px] md:text-[11px] ml-0.5";
            }
        }

        // ==========================================
        // INTERACCIONES DEL OPERADOR (RATÓN)
        // ==========================================
        let clickTimer = null;

        function interaccionVideo(e, vidId, index) {
            let overlay = document.getElementById(`offline-${index}`);
            if(overlay && !overlay.classList.contains('hidden')) return;

            if (clickTimer) clearTimeout(clickTimer);
            
            clickTimer = setTimeout(() => {
                let video = document.getElementById(vidId);
                if (video) {
                    if (video.paused) video.play();
                    else video.pause();
                }
            }, 250); 
        }

        function toggleFullScreen(wrapperId) {
            if (clickTimer) clearTimeout(clickTimer); 
            
            let elem = document.getElementById(wrapperId);
            if (!elem) return;

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        // ==========================================
        // PANEL LATERAL (INVENTARIO DE CÁMARAS)
        // ==========================================
        function toggleSidePanel() {
            let panel = document.getElementById('side-panel-cameras');
            isPanelOpen = !isPanelOpen;
            if (isPanelOpen) {
                panel.classList.remove('translate-x-full');
            } else {
                panel.classList.add('translate-x-full');
            }
        }

        function renderizarListaLateral() {
            document.getElementById('total-cams-badge').innerText = dataCCTVGlobal.length;
            let container = document.getElementById('camera-list-container');
            let html = '';

            dataCCTVGlobal.forEach((cam, index) => {
                html += `
                <div onclick="saltarACamara(${index})" class="bg-[#121212] border border-neutral-800 p-2 rounded hover:border-cyan-500/50 cursor-pointer transition-colors group relative overflow-hidden">
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-neutral-800 group-hover:bg-cyan-500 transition-colors"></div>
                    <div class="flex items-center gap-2 ml-2">
                        <div class="w-6 h-6 rounded bg-[#1a1a1a] flex items-center justify-center shrink-0 border border-neutral-800 group-hover:border-cyan-500/30 group-hover:bg-cyan-500/10 transition-colors">
                            <i class="fa-solid fa-video text-[9px] text-gray-500 group-hover:text-cyan-500"></i>
                        </div>
                        <div class="overflow-hidden flex-1">
                            <div class="flex justify-between items-center">
                                <h4 class="text-[10px] font-bold text-gray-300 uppercase truncate group-hover:text-white leading-tight">${cam.ubicacion}</h4>
                                <span class="text-neutral-600 font-console text-[8px]">CH-${String(index+1).padStart(2, '0')}</span>
                            </div>
                            <p class="text-[8px] text-neutral-500 font-console uppercase truncate mt-0.5">${cam.distrito}</p>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function saltarACamara(globalIndex) {
            let targetPage = Math.floor(globalIndex / currentSlots);
            if (targetPage !== currentPage) {
                currentPage = targetPage;
                renderizarGridMatrix();
            }
            toggleSidePanel(); 
        }
    </script>
</body>
</html>
