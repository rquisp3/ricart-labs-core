  var cecomMiniMap = null;

  function initMiniMapCECOM() {
    var container = document.getElementById('cecom-minimap');
    if(!container) return;

    // 1. Limpiamos instancias previas
    if(cecomMiniMap) { cecomMiniMap.remove(); cecomMiniMap = null; }

    // 2. TUS COORDENADAS FIJAS Y ZOOM TÁCTICO (13 es ideal para calles)
    var center = [-12.04100, -77.04231];
    var zoom = 13; 

    // 3. Inicializamos el minimapa
    cecomMiniMap = L.map('cecom-minimap', { zoomControl: true, attributionControl: false }).setView(center, zoom);
    
    var style = isDarkMode ? 'dark-v11' : 'light-v11';
    L.tileLayer('https://api.mapbox.com/styles/v1/mapbox/' + style + '/tiles/256/{z}/{x}/{y}@2x?access_token=' + MAPBOX_TOKEN).addTo(cecomMiniMap);

    var iconPicker = L.divIcon({
        html: '<div class="w-6 h-6 rounded-full bg-blue-600 flex items-center justify-center text-white shadow-lg border-2 border-white"><i class="fa-solid fa-location-crosshairs text-[12px]"></i></div>',
        className: '', iconSize: [16, 16], iconAnchor: [8, 16]
    });

    cecomMarker = L.marker(center, { icon: iconPicker, draggable: true }).addTo(cecomMiniMap);

    cecomMarker.on('dragend', function(e) {
        resolverUbicacion(e.target.getLatLng());
    });

    setTimeout(function() {
        cecomMiniMap.invalidateSize();
        resolverUbicacion(center); // Resuelve la dirección de Lima al abrir
    }, 150);
  }

  function resolverUbicacion(latlng) {
      var lat = latlng.lat.toFixed(5);
      var lng = latlng.lng.toFixed(5);
      
      document.getElementById('cecom-coord').value = lat + ", " + lng;
      var ubiInput = document.getElementById('cecom-ubi');
      
      ubiInput.value = "Traduciendo satelite...";

      var url = "https://api.mapbox.com/geocoding/v5/mapbox.places/" + lng + "," + lat + ".json?access_token=" + MAPBOX_TOKEN + "&language=es";
      
      fetch(url)
          .then(function(res) { return res.json(); })
          .then(function(data) {
              if(data && data.features && data.features.length > 0) {
                  var nombreLugar = data.features[0].place_name;
                  nombreLugar = nombreLugar.replace(', Perú', '').replace(', Peru', '');
                  ubiInput.value = nombreLugar;
              } else {
                  ubiInput.value = "Zona rural";
              }
          })
          .catch(function(err) {
              ubiInput.value = "Error al resolver";
          });
  }

  /* ==========================================

function initMap() {
  try {
    // 1. Inicialización limpia. Si ya existe un mapa, lo eliminamos para evitar conflictos
    if (typeof map !== 'undefined' && map !== null) {
        map.remove();
    }

    // 2. Creación del objeto Mapa con fondo táctico #1F1F1F
    map = L.map('map', {
        zoomSnap: 0.1, 
        zoomControl: false, 
        attributionControl: false,
        fadeAnimation: true
    }).setView([-9.1900, -75.0152], 6);

    // 3. Aplicar fondo oscuro al contenedor inmediatamente
    const mapContainer = map.getContainer();
    if(mapContainer) {
        mapContainer.style.backgroundColor = '#1F1F1F';
    }

    // 4. Control de Zoom a la izquierda
    // L.control.zoom({ position: 'topleft' }).addTo(map);
    
    // 5. Mudador de Controles (Solo si el mapa carga correctamente)
    map.whenReady(function() {
      setTimeout(() => {
        const destinoIzquierda = document.querySelector('.leaflet-top.leaflet-left');
        const controlesDerecha = document.querySelectorAll('.leaflet-top.leaflet-right, .mapboxgl-ctrl-top-right');
        
        if (destinoIzquierda) {
          controlesDerecha.forEach(contenedor => {
            while (contenedor.firstChild) {
              destinoIzquierda.appendChild(contenedor.firstChild);
            }
            contenedor.style.display = 'none';
          });
          
          // Alineación de los botones mudados
          const botones = destinoIzquierda.querySelectorAll('.leaflet-control, .mapboxgl-ctrl');
          botones.forEach(btn => {
            btn.style.margin = '5px 0 0 10px';
            btn.style.float = 'none';
          });
        }
      }, 1500);
    });

    // 6. Cargar Capas y Marcadores (Llamada a las funciones siguientes)
    setMapLayer();
    markerGroup = L.layerGroup().addTo(map);
    
    // 7. Re-vincular eventos
    window.addEventListener('resize', forceMapRepaint);
    
    console.log("SISTEMA SAM: Mapa e Inteligencia inicializados correctamente.");
  } catch (error) {
    console.error("ERROR CRÍTICO EN INITMAP:", error);
  }
}

  function setMapLayer() {
    // 1. Limpiar capas anteriores (Mapa base y Cuadrícula)
    if(mapTileLayer) map.removeLayer(mapTileLayer);
    if(tacticalGridLayer) map.removeLayer(tacticalGridLayer);

    const style = isDarkMode ? 'dark-v11' : 'light-v11';
    
    // 2. Cargar Mapa Base Mapbox
    mapTileLayer = L.tileLayer('https://api.mapbox.com/styles/v1/mapbox/' + style + '/tiles/256/{z}/{x}/{y}@2x?access_token=' + MAPBOX_TOKEN, {
      maxZoom: 18
    }).addTo(map);

    // 3. Forzar color de fondo del contenedor
    const mapContainer = document.getElementById('map');
    if(mapContainer) {
        mapContainer.style.backgroundColor = isDarkMode ? '#1F1F1F' : '#DBDBDC';
    }

    // ==========================================
    // 4. CAPA TÁCTICA: CUADRANTES DINÁMICOS
    // ==========================================
    tacticalGridLayer = new L.GridLayer({ 
        tileSize: 200, // Tamaño de cada cuadrante
        zIndex: 5      // Se dibuja sobre el mapa, pero bajo las alertas
    });

    tacticalGridLayer.createTile = function(coords) {
        var tile = document.createElement('div');
        
        // Estilo de las líneas: Verde neón en oscuro, gris en claro
        tile.style.outline = isDarkMode ? '1px solid rgba(0, 255, 65, 0.08)' : '1px solid rgba(0, 0, 0, 0.08)';

        // Mostrar texto de nomenclatura solo si el zoom es > 5 (para no saturar a nivel de continente)
        if (coords.z > 5) {
            tile.style.display = 'flex';
            tile.style.alignItems = 'flex-end';
            tile.style.justifyContent = 'flex-end';
            tile.style.padding = '4px 6px';
            // Color de la letra táctica según el tema
            tile.style.color = isDarkMode ? 'rgba(0, 255, 65, 0.3)' : 'rgba(0, 0, 0, 0.3)';
            tile.style.fontSize = '9px';
            tile.style.fontFamily = 'monospace';
            tile.style.fontWeight = 'bold';
            tile.style.letterSpacing = '1px';
            tile.style.pointerEvents = 'none'; // Evita bloquear los clics en el mapa
            
            // Generador de Nomenclatura (Ej: Q-K84 / NM)
            let letra = String.fromCharCode(65 + (Math.abs(coords.x) % 26)); 
            let numero = Math.abs(coords.y % 100); 
            
            tile.innerHTML = `Q-${letra}${numero} <span style="font-size:7px; margin-left:3px; opacity:0.7;">NM</span>`;
        }
        
        return tile;
    };

    // Añadir la cuadrícula final al mapa
    tacticalGridLayer.addTo(map);
}

  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById('icon-theme');
    isDarkMode = !isDarkMode;
    
    if(isDarkMode) {
      html.classList.add('dark');
      icon.classList.replace('fa-moon', 'fa-sun');
    } else {
      html.classList.remove('dark');
      icon.classList.replace('fa-sun', 'fa-moon');
    }
    setMapLayer(); 
  }

  function startClock() {
    const clockEl = document.getElementById('sys-clock');
    const dateEl = document.getElementById('sys-date');
    
    if(!clockEl || !dateEl) return;

    setInterval(() => {
      const now = new Date();
      
      // 1. Formatear la Fecha (Ej: MIÉ, 4 MAR. 2026)
      const dateOptions = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric', timeZone: 'America/Lima' };
      let dateStr = now.toLocaleDateString('es-PE', dateOptions).toUpperCase();
      // Limpiamos si el navegador le pone un punto extra al día
      dateStr = dateStr.replace(/(\d+)\./, '$1'); 
      
      // 2. Formatear la Hora (Ej: 14:30:00)
      const timeStr = now.toLocaleTimeString('es-PE', { hour12: false, timeZone: 'America/Lima' });
      
      // 3. Inyectar en los contenedores separados
      clockEl.innerText = timeStr;
      dateEl.innerText = dateStr;
    }, 1000);
  }

  /* ==========================================
     MOTOR MODO FULLSCREEN (TÁCTICO v5)
     ========================================== */
  let isFullscreen = false;

  function toggleFullScreen() {
      isFullscreen = !isFullscreen;
      
      const cardsHud = document.getElementById('cards-hud'); 
      const compactCounters = document.getElementById('compact-counters');
      const icon = document.getElementById('icon-fullscreen');
      
      if (isFullscreen) {
          // ACTIVAR MODO DESPEJADO: Añadimos '!hidden' para forzar la desaparición
          if(cardsHud) cardsHud.classList.add('!hidden'); 
          if(compactCounters) compactCounters.classList.remove('hidden'); 
          if(icon) {
              icon.classList.remove('fa-expand');
              icon.classList.add('fa-compress');
          }
          actualizarPildoras(); 
      } else {
          // VOLVER A MODO NORMAL: Removemos '!hidden' y Tailwind restaura el grid
          if(cardsHud) cardsHud.classList.remove('!hidden'); 
          if(compactCounters) compactCounters.classList.add('hidden');
          if(icon) {
              icon.classList.remove('fa-compress');
              icon.classList.add('fa-expand');
          }
      }

      setTimeout(() => { if(typeof map !== 'undefined' && map) map.invalidateSize(); }, 200);
  }

  function actualizarPildoras() {
      // Clona los valores de las tarjetas grandes a las píldoras pequeñas
      const s = document.getElementById('hud-sutran-count');
      const b = document.getElementById('hud-cgbvp-count');
      const i = document.getElementById('hud-igp-mag');
      const c = document.getElementById('hud-cecom-count');
      const p = document.getElementById('dicapi-count'); // Nuevo: Captura el valor de Puertos

      if(s) document.getElementById('compact-sutran').innerText = s.innerText;
      if(b) document.getElementById('compact-bomberos').innerText = b.innerText;
      if(i) document.getElementById('compact-igp').innerText = i.innerText;
      if(c) document.getElementById('compact-cecom').innerText = c.innerText;
      
      // Sincroniza el contador de la nueva píldora DICAPI
      if(p && document.getElementById('compact-dicapi')) {
          document.getElementById('compact-dicapi').innerText = p.innerText;
      }
  }

  function forceMapRepaint() {
    setTimeout(() => { 
      if(map) { 
        map.invalidateSize(); 
        map.panBy([1,0], {animate:false}); 
        map.panBy([-1,0], {animate:false}); 
      } 
    }, 300);
  }

  /* ==========================================

     ========================================== */
  function openSidebar(modulo) {
    const sidebar = document.getElementById('right-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const titleEl = document.getElementById('sidebar-title');
    const contentEl = document.getElementById('sidebar-content');
    
    // Solo recargamos el HTML si estamos cambiando de módulo (MEMORIA INTELIGENTE)
    if (titleEl.innerText !== modulo) {
      titleEl.innerText = modulo;
      if(modulo === 'ALERTAS SUTRAN') contentEl.innerHTML = htmlListaSutran;
      else if (modulo === 'ALERTAS IGP') contentEl.innerHTML = htmlListaIgp;
      else if (modulo === 'ALERTAS CGBVP') contentEl.innerHTML = htmlListaBomberos;
      else if (modulo === 'NUEVA ALERTA CECOM') {
          contentEl.innerHTML = htmlFormularioCECOM;
          setTimeout(() => initMiniMapCECOM(), 200); 
      }
      else if (modulo === 'ALERTAS SAM') contentEl.innerHTML = htmlListaCecom;
      else contentEl.innerHTML = '<div class="text-center opacity-50 pt-20">Módulo en construcción</div>';
    }
    
    // --------------------------------
    
    sidebar.classList.remove('sidebar-closed');
    sidebar.classList.add('sidebar-open');
    overlay.classList.remove('hidden');
    setTimeout(() => overlay.classList.remove('opacity-0'), 10);
    forceMapRepaint();
  }

  function closeSidebar() {
    const sidebar = document.getElementById('right-sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    
    sidebar.classList.remove('sidebar-open');
    sidebar.classList.add('sidebar-closed');
    
    overlay.classList.add('opacity-0');
    setTimeout(() => overlay.classList.add('hidden'), 300);
    forceMapRepaint();
  }

  function refreshData() {
    let btn = document.getElementById('btn-sync');
    let icon = document.getElementById('icon-sync');
    icon.classList.add('fa-spin'); 
    btn.classList.add('pointer-events-none', 'opacity-70');
    
    // DETENER TICKER Y NOTIFICAR
    let tickerEl = document.getElementById('ticker-content');
    if(tickerEl) {
       tickerEl.style.animation = 'none'; // Frena la cinta
       tickerEl.innerHTML = '<span class="mx-6 text-blue-400 font-console font-bold text-[14px] uppercase tracking-widest"><i class="fa-solid fa-satellite-dish fa-fade mr-2"></i> Interceptando señales del Data Lake... Actualizando Módulos...</span>';
    }
    
    google.script.run.withSuccessHandler((res) => {
      icon.classList.remove('fa-spin');
      btn.classList.remove('pointer-events-none', 'opacity-70');
      
      if(res && res.error) {
        Swal.fire({ icon: 'error', title: 'Error', text: res.error, background: isDarkMode ? '#171717' : '#fff', color: isDarkMode ? '#fff' : '#000' });
      } else {
        procesarDatosCompletos(res); // Esto redibuja todo y reinicia el ticker
        
        // Restaurar animación del ticker
        if(tickerEl) tickerEl.style.animation = ''; 
        
        icon.classList.remove('fa-rotate-right');
        icon.classList.add('fa-check', 'text-green-500');
        setTimeout(() => {
          icon.classList.remove('fa-check', 'text-green-500');
          icon.classList.add('fa-rotate-right');
        }, 2000);
      }
    }).obtenerDatosCompletos();
  }

  function refreshOSINT() {

      if(contenedorUI && contenedorUI.parentElement) {
          contenedorUI.parentElement.classList.add('hidden'); 
      }

      google.script.run
        .withSuccessHandler(function(data) {
            ultimaDataOSINT = data || []; // Guardar para el PDF
            
            // ==========================================
            // 🚨 SONDA DE DIAGNÓSTICO (TELEMETRÍA CRÍTICA)
            // ==========================================
            console.log("=== INFORME DE INTELIGENCIA OSINT (CRUDO) ===");
            console.log("Cantidad de intercepciones:", ultimaDataOSINT.length);
            if(ultimaDataOSINT.length > 0) {
               console.log("Muestra del Primer Registro:", ultimaDataOSINT[0]);
            }
            // ==========================================
            
            let tickerEl = document.getElementById('ticker-content');
            if(ultimaDataOSINT.length > 0 && tickerEl) {
                let tickerHtmlStr = '';
                let totalCaracteres = 0; // <-- Contador táctico

                ultimaDataOSINT.forEach(item => {
                    let dObj = new Date(item.fechaObj || new Date());
                    let dia = String(dObj.getDate()).padStart(2, '0');
                    let mes = String(dObj.getMonth() + 1).padStart(2, '0');
                    let hr = String(dObj.getHours()).padStart(2, '0');
                    let min = String(dObj.getMinutes()).padStart(2, '0');
                    
                    // Calculamos la masa de texto real
                    let textoVisible = `[${item.fuente}] ${item.titulo} (${dia}/${mes} ${hr}:${min})`;
                    totalCaracteres += textoVisible.length + 15; // +15 por los márgenes y el separador '|'
                    
                    tickerHtmlStr += `<a href="${item.enlace}" target="_blank" title="Abrir noticia original" class="mx-6 inline-flex items-center gap-1.5 text-[14px] cursor-pointer group transition-all">
                        <b class="text-purple-400 font-bold group-hover:text-purple-300 drop-shadow-md">[${item.fuente.toUpperCase()}]</b> 
                        <span class="text-white group-hover:text-blue-400 transition-colors">${item.titulo}</span> 
                        <span class="text-gray-400 text-[12px] font-console ml-1">(${dia}/${mes} ${hr}:${min})</span> 
                        <span class="mx-2 text-gray-700 pointer-events-none">|</span>
                    </a>`;
                });
                
                tickerEl.innerHTML = tickerHtmlStr + tickerHtmlStr; // Doble para scroll infinito
                
                // 3. FÍSICA DINÁMICA
                let duracionCalculada = Math.max(totalCaracteres * 0.19, 30); 
                tickerEl.style.animationDuration = duracionCalculada + 's';
            }
        })
        .obtenerRadarOSINT();
  }

  // Radar silencioso: Deja un anillo pulsante sin mover violentamente la cámara del operador
  function spawnSilentRadar(lat, lng, colorTailwind) {
    let colorHex = '#ef4444'; // Rojo por defecto
    if (colorTailwind === 'yellow') colorHex = '#eab308';
    else if (colorTailwind === 'amber') colorHex = '#f59e0b';
    else if (colorTailwind === 'orange') colorHex = '#f97316';
    
    let customIcon = L.divIcon({ html: '<div class="radar-ping" style="background-color: ' + colorHex + ';"></div>', className: '', iconSize: [40, 40], iconAnchor: [20, 20] });
    let tempRadar = L.marker([lat, lng], { icon: customIcon, zIndexOffset: -100 }).addTo(map);
    
    // El sonar desaparece solo después de 3 minutos
    setTimeout(() => { if(map) map.removeLayer(tempRadar); }, 30000); 
  }

  // NUEVO MOTOR: Enciende o apaga secciones enteras de un solo clic
  function toggleGroup(prefix) {
      let masterCheckbox = document.getElementById('group-' + prefix);
      let targetState = masterCheckbox.checked;

      // Escaneamos todas las capas. Si empiezan por el prefijo (Ej: 'SUTRAN_'), copian el estado del padre.
      for (let key in layerState) {
          if (key.startsWith(prefix + '_')) { 
              layerState[key] = targetState;
          }
      }
      
      applyLayerFilters();
      applyDicapiFilters();
      if (globalCounts) buildLayerPanel(globalCounts); // Forzamos recarga visual
  }


  function applyLayerFilters() {
      markerGroup.clearLayers();
      
      // Limpiamos el mapa de calor si ya existía
      if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
      
      let heatPoints = []; // Array para guardar las coordenadas calientes

      allMarkers.forEach(item => {
          if (layerState[item.layerId]) {
              item.marker.addTo(markerGroup);
              
              // Si el Heatmap está activo, recolectamos las coordenadas de las alertas
              // Excluimos la capa 'SEDES' porque las sedes no son alertas de riesgo
              if (layerState['HEATMAP'] && item.layerId !== 'SEDES') {
                  let latlng = item.marker.getLatLng();
                  // Guardamos [Latitud, Longitud, Intensidad]
                  heatPoints.push([latlng.lat, latlng.lng, 1]); 
              }
          }
      });

      // Dibujamos la capa térmica si hay puntos
      if (layerState['HEATMAP'] && heatPoints.length > 0) {
          heatLayer = L.heatLayer(heatPoints, {
              radius: 20,      // Tamaño de la mancha de calor
              blur: 25,        // Difuminado de los bordes
              maxZoom: 10,     // A partir de qué zoom el calor se vuelve intenso
              gradient: {      // Colores de frío a caliente (Azul -> Verde -> Amarillo -> Rojo)
                  0.3: '#3b82f6', 
                  0.5: '#22c55e', 
                  0.7: '#eab308', 
                  1.0: '#ef4444' 
              }
          }).addTo(map);
      }
  }


  // ==========================================================
  // CEREBRO DE PROCESAMIENTO (DATOS)
  // ==========================================================
  function procesarDatosCompletos(datos) {
    if(!datos) return;
    datosGlobales = datos;
    
    if(datos.sutran) {
        datos.sutran.forEach(r => { 
            let id = r['ID SUTRAN']; 
            if(id && !sysMemory.sutran.has(id)) { 
                sysMemory.sutran.add(id); 
                if(!isFirstLoad) { triggerCardAlarm('ALERTAS SUTRAN'); }
            }
        });
    }
    if(datos.bomberos) {
        datos.bomberos.forEach(r => { 
            let id = r['Nro Parte']; 
            if(id && !sysMemory.bomberos.has(id)) { 
                sysMemory.bomberos.add(id); 
                if(!isFirstLoad) { 
                    triggerCardAlarm('ALERTAS CGBVP'); 
                    if(r['Estado'].toUpperCase().includes('ATENDIENDO')) spawnSilentRadar(parseFloat(r['Latitud']), parseFloat(r['Longitud']), 'red');
                }
            }
        });
    }
    if(datos.igp) {
        datos.igp.forEach(r => { 
            let id = r['ID Reporte']; 
            if(id && !sysMemory.igp.has(id)) { 
                sysMemory.igp.add(id); 
                if(!isFirstLoad) { 
                    triggerCardAlarm('ALERTAS IGP'); 
                    spawnSilentRadar(parseFloat(r['Latitud']), parseFloat(r['Longitud']), 'amber');
                }
            }
        });
    }
    if(datos.cecom) {
        datos.cecom.forEach(r => { 
            let id = r['Codigo'] || r['Código']; 
            if(id && !sysMemory.cecom.has(id)) { 
                sysMemory.cecom.add(id); 
                if(!isFirstLoad && r['Estado'].toUpperCase().includes('ACTIVO')) { 
                    triggerCardAlarm('ALERTAS SAM');
                    let coordStr = r['Coordenadas'] || '';
                    if(coordStr.includes(',')){
                        let pts = coordStr.split(',');
                        spawnSilentRadar(parseFloat(pts[0]), parseFloat(pts[1]), 'red');
                    }
                }
            }
        });
    }
    
    if (markerGroup) markerGroup.clearLayers();
    allMarkers = []; 
    
    let counts = {
      sutran: { total: 0, interrumpido: 0, restringido: 0, normal: 0 },
      cgbvp: { total: 0, incendio: 0, matpel: 0, accveh: 0, emergmed: 0, rescate: 0, servesp: 0, cerrado: 0 },
      igp: { total: 0, alto: 0, moderado: 0, leve: 0 },
      sedes: { total: 0 },
      cecom: { total: 0, alto: 0, medio: 0 },
      dicapi: { total: 0, rojo: 0, ambar: 0, verde: 0 } // <-- NUEVO CONTADOR
    };

    function parseDateGlobal(dStr) {
        if(!dStr) return 0;
        let str = String(dStr).trim().toUpperCase();
        let dateMatch = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (!dateMatch) return 0;
        let year = dateMatch[3], month = dateMatch[2], day = dateMatch[1];
        
        let timeMatch = str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
        let hh = "00", mm = "00", ss = "00";
        if (timeMatch) {
            hh = timeMatch[1].padStart(2, '0');
            mm = timeMatch[2];
            ss = timeMatch[3] || "00";
            if (str.includes('P.M.') || str.includes('PM')) {
                let hNum = parseInt(hh, 10);
                if (hNum < 12) hh = (hNum + 12).toString();
            } else if (str.includes('A.M.') || str.includes('AM')) {
                let hNum = parseInt(hh, 10);
                if (hNum === 12) hh = "00";
            }
        }
        return parseInt(year + month + day + hh + mm + ss, 10);
    }

    function estandarizarFecha(dStr) {
        if(!dStr || dStr === '-') return '-';
        let str = String(dStr).trim().toUpperCase();
        let dateMatch = str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (!dateMatch) return dStr; 
        let dd = dateMatch[1], mm = dateMatch[2], yyyy = dateMatch[3];
        
        let timeMatch = str.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
        if (timeMatch) {
            let hh = timeMatch[1].padStart(2, '0');
            let min = timeMatch[2];
            let ss = timeMatch[3] || "00";
            if (str.includes('P.M.') || str.includes('PM')) {
                let hNum = parseInt(hh, 10);
                if (hNum < 12) hh = (hNum + 12).toString().padStart(2, '0');
            } else if (str.includes('A.M.') || str.includes('AM')) {
                let hNum = parseInt(hh, 10);
                if (hNum === 12) hh = "00";
            }
            return dd + '/' + mm + '/' + yyyy + ' ' + hh + ':' + min + ':' + ss;
        }
        return dd + '/' + mm + '/' + yyyy + ' 00:00:00';
    }

    
    // ================== 2. PROCESAR SUTRAN ==================
    if(datos.sutran && datos.sutran.length > 0) {
      datos.sutran.sort(function(a, b) {
          return parseDateGlobal(b['Fecha del evento']) - parseDateGlobal(a['Fecha del evento']);
      });

      let builderHtmlSutran = '<div class="space-y-2 font-sans">'; 
      datos.sutran.forEach(function(row, idx) {
        try {
          counts.sutran.total++;
          
          // FIX TÁCTICO: Limpieza de palabra y homologación de texto
          let estadoLimpio = (row['Estado'] || 'NORMAL').toUpperCase().replace('TRÁNSITO ', '').replace('TRANSITO ', '').trim();
          let colorTailwind = 'green';
          let layerId = 'SUTRAN_NORMAL';
          
          // FIX TÁCTICO: Cambio de Orange a Amber para igualar paleta SAM_
          if (estadoLimpio.includes('INTERRUMPIDO')) { colorTailwind = 'red'; counts.sutran.interrumpido++; layerId = 'SUTRAN_INTERRUMPIDO'; }
          else if (estadoLimpio.includes('RESTRINGIDO')) { colorTailwind = 'amber'; counts.sutran.restringido++; layerId = 'SUTRAN_RESTRINGIDO'; }
          else { counts.sutran.normal++; estadoLimpio = 'NORMAL'; }

          let lat = null, lng = null;
          let coordsStr = String(row['Coordenada'] || '');
          if (coordsStr.includes(',')) {
            let pts = coordsStr.split(',');
            lat = parseFloat(pts[0].trim()); lng = parseFloat(pts[1].trim());
            if (lat < -50 || lat > 0) { let temp = lat; lat = lng; lng = temp; }
            if(!isNaN(lat) && !isNaN(lng)) {
              let idAcordeon = 'acord-sutran-' + idx;
              let iconSutran = L.divIcon({
                 html: '<div class="w-5 h-5 rounded-full bg-' + colorTailwind + '-500 icon-marker marker-rumble flex items-center justify-center text-white dark:text-gray-900"><i class="fa-solid fa-road-barrier text-[12px]"></i></div>',
                 className: '', iconSize: [20, 20], iconAnchor: [10, 10]
              });
              let marker = L.marker([lat, lng], { icon: iconSutran }).on('click', function() {
                  enfocarDesdeMapa(lat, lng, idAcordeon, colorTailwind, 'ALERTAS SUTRAN');
              }).bindTooltip('<b class="font-sans text-[10px] uppercase text-'+colorTailwind+'-500">' + (row['Carretera'] || 'Vía') + '</b><br><span class="text-[9px] dark:text-gray-300">' + (row['Afectación'] || '') + '</span>', { className: 'custom-tooltip' });
              allMarkers.push({ marker: marker, layerId: layerId });

          }

          let idAcordeon = 'acord-sutran-' + idx;
          let accionClic = (!isNaN(lat) && !isNaN(lng)) ? "clickDesdeSidebar(" + lat + ", " + lng + ", '" + idAcordeon + "', '" + colorTailwind + "')" : "";
          
          builderHtmlSutran += '<div class="bg-white dark:bg-[#121212] border border-gray-200 dark:border-neutral-800 rounded shadow-sm hover:border-' + colorTailwind + '-500/50 transition-colors cursor-pointer overflow-hidden" onclick="' + accionClic + '">' +
              '<div class="p-2.5 flex items-start gap-2">' +
                '<div class="w-1 h-6 rounded bg-' + colorTailwind + '-500 mt-1 shrink-0"></div>' +
                '<div class="flex-1">' +
                  '<div class="flex justify-between items-start mb-0.5">' +
                    '<h4 class="font-bold text-gray-900 dark:text-gray-200 text-[10px] leading-tight pr-2 uppercase line-clamp-1">' + (row['Carretera'] || 'Vía sin nombre') + '</h4>' +
                    '<span class="text-' + colorTailwind + '-500 text-[8px] font-console px-1 border border-' + colorTailwind + '-500/30 rounded bg-' + colorTailwind + '-500/10 uppercase shrink-0">' + estadoLimpio + '</span>' +
                  '</div>' +
                  '<p class="text-[9px] text-gray-500 dark:text-gray-500 font-medium truncate w-56 md:w-64"><i class="fa-solid fa-location-arrow"></i> ' + (row['Afectación'] || 'Sin sector') + '</p>' +
                '</div>' +
              '</div>' +
              '<div id="' + idAcordeon + '" class="expand-content bg-gray-50 dark:bg-[#0a0a0a] border-t border-gray-100 dark:border-neutral-800 px-3">' +
                '<div class="grid grid-cols-2 gap-2 mb-2 mt-3">' +
                  '<div class="col-span-2"><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Evento</p><p class="text-[10px] text-gray-800 dark:text-gray-300 font-bold uppercase">' + (row['Evento'] || 'SIN DETALLE') + '</p></div>' +
                  '<div><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Fecha Evento</p><p class="text-[10px] text-gray-800 dark:text-gray-300">' + (row['Fecha del evento'] || '-') + '</p></div>' +
                  '<div><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Ubigeo</p><p class="text-[10px] text-gray-800 dark:text-gray-300">' + (row['Ubigeo'] || '-') + '</p></div>' +
                  '<div class="col-span-2"><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Fuente</p><p class="text-[10px] text-gray-800 dark:text-gray-300 uppercase">' + (row['Fuente'] || 'N/A') + '</p></div>' +
                '</div>' +
                '<p class="text-[9px] text-blue-600 dark:text-blue-500 font-console text-center pb-2"><i class="fa-solid fa-earth-americas"></i> ' + coordsStr + '</p>' +
              '</div>' +
            '</div>';
        } catch(e) {}
      });
      htmlListaSutran = builderHtmlSutran + '</div>';

      let counterEl = document.getElementById('counter-sutran');
      if (counterEl) counterEl.innerText = counts.sutran.interrumpido + counts.sutran.restringido;
      if(document.getElementById('dash-int')) document.getElementById('dash-int').innerText = counts.sutran.interrumpido;
      if(document.getElementById('dash-res')) document.getElementById('dash-res').innerText = counts.sutran.restringido;
      if(document.getElementById('dash-nor')) document.getElementById('dash-nor').innerText = counts.sutran.normal;
    }

    // ================== 3. PROCESAR IGP ==================
    if(datos.igp && datos.igp.length > 0) {
      let builderHtmlIgp = '<div class="space-y-2 font-sans">';
      datos.igp.forEach(function(row, idx) {
         try {
           counts.igp.total++;
           var lat = parseFloat(row['Latitud']);

           var mag = row['Magnitud'] || '-';

           if (magVal >= 6.0) { colorTailwind = 'red'; estadoIgp = 'ALTO'; counts.igp.alto++; layerId = 'IGP_ALTO'; } 
           else if (magVal >= 4.5) { colorTailwind = 'yellow'; estadoIgp = 'MODERADO'; counts.igp.moderado++; layerId = 'IGP_MODERADO'; }
           else { counts.igp.leve++; }
           
           if (!isNaN(lat) && !isNaN(lng)) {
              var idAcord = 'acord-igp-' + idx;

          let fA = kFA ? a[kFA] : ''; let fB = kFB ? b[kFB] : '';
          return parseDateGlobal(fB) - parseDateGlobal(fA); 
      });

      let builderHtmlCecom = '<div class="space-y-2 font-sans">';
      let activas = 0;

      datos.cecom.forEach(function(row, idx) {
         try {
           let keys = Object.keys(row);
           let keyEst = keys.find(k => k.toLowerCase().includes('estado'));
           let keyFecha = keys.find(k => k.toLowerCase().includes('fecha'));
           let keyUbi = keys.find(k => k.toLowerCase().includes('ubicaci'));
           let keyDesc = keys.find(k => k.toLowerCase().includes('descrip'));
           let keyCod = keys.find(k => k.toLowerCase().includes('codigo') || k.toLowerCase().includes('código'));
           let keyCoord = keys.find(k => k.toLowerCase().includes('coord'));

           let estado = keyEst ? String(row[keyEst]).toUpperCase() : '';
           if(!estado.includes('ACTIVO')) return; 
           
           if(activas === 0) lastCecomMatched = row; // Capturamos el más reciente
           activas++;
           counts.cecom.total++;
           
           let riesgo = (row['Nivel Riesgo'] || '').toUpperCase();
           let colorTailwind = riesgo.includes('ALTO') ? 'red' : 'yellow';
           let layerId = riesgo.includes('ALTO') ? 'CECOM_ALTO' : 'CECOM_MEDIO';
           if(riesgo.includes('ALTO')) counts.cecom.alto++; else counts.cecom.medio++;

           let lat = null, lng = null;
           let coordsStr = keyCoord ? String(row[keyCoord]) : '';

           }

           let fechaStr = keyFecha ? row[keyFecha] : '-';
           let ubi = keyUbi ? row[keyUbi] : '-';
           let desc = keyDesc ? row[keyDesc] : '-';
           let cod = keyCod ? row[keyCod] : '-';
           let tipoEve = row['Tipo Evento'] || 'EVENTO';

              let marker = L.marker([lat, lng], { icon: iconCecom }).on('click', function() { enfocarDesdeMapa(lat, lng, idAcord, colorTailwind, 'ALERTAS SAM'); }).bindTooltip('<b class="font-sans text-[10px] uppercase text-'+colorTailwind+'-500">CECOM: ' + tipoEve + '</b><br><span class="text-[9px] dark:text-gray-300">' + ubi + '</span>', { className: 'custom-tooltip' });
              allMarkers.push({ marker: marker, layerId: layerId });
           }

           let idAcord = 'acord-cecom-' + idx;
           let accionClic = (!isNaN(lat) && !isNaN(lng)) ? "clickDesdeSidebar(" + lat + ", " + lng + ", '" + idAcord + "', '" + colorTailwind + "')" : "";
           
           builderHtmlCecom += '<div class="bg-white dark:bg-[#121212] border border-gray-200 dark:border-neutral-800 rounded shadow-sm hover:border-' + colorTailwind + '-500/50 cursor-pointer overflow-hidden" onclick="' + accionClic + '"><div class="p-2.5 flex items-start gap-2"><div class="w-1 h-6 rounded bg-' + colorTailwind + '-500 mt-1 shrink-0"></div><div class="flex-1"><div class="flex justify-between items-start mb-0.5"><h4 class="font-bold text-gray-900 dark:text-gray-200 text-[10px] leading-tight pr-2 uppercase">' + tipoEve + '</h4><span class="text-' + colorTailwind + '-500 text-[8px] font-console px-1 border border-' + colorTailwind + '-500/30 rounded bg-' + colorTailwind + '-500/10 uppercase shrink-0">' + riesgo + '</span></div><p class="text-[9px] text-gray-500 truncate w-56"><i class="fa-solid fa-location-arrow"></i> ' + ubi + '</p></div></div><div id="' + idAcord + '" class="expand-content bg-gray-50 dark:bg-[#0a0a0a] border-t border-gray-100 dark:border-neutral-800 px-3"><div class="grid grid-cols-2 gap-2 mb-2 mt-3"><div><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Fecha</p><p class="text-[10px] text-gray-800 dark:text-gray-300">' + fechaStr + '</p></div><div><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Codigo</p><p class="text-[10px] text-gray-800 dark:text-gray-300 font-console">' + cod + '</p></div><div class="col-span-2"><p class="text-[8px] text-gray-400 font-console uppercase tracking-wide">Detalles</p><p class="text-[10px] text-gray-800 dark:text-gray-300">' + desc + '</p></div></div><p class="text-[9px] text-blue-600 dark:text-blue-500 font-console text-center pb-2"><i class="fa-solid fa-earth-americas"></i> ' + coordsStr + '</p></div></div>';
         } catch(e) {}
      });
      htmlListaCecom = activas > 0 ? (builderHtmlCecom + '</div>') : '<div class="text-center text-gray-500 py-10 font-console">No hay alertas SAM activas.</div>';

    // Dibujar la leyenda (filtros) y pintar el mapa

    buildLayerPanel(counts);

    let genMarquee = (text, cls) => {
        if(!text || text === '-' || text === '') return `<span class="truncate block text-[9.5px] ${cls} uppercase w-full">-</span>`;
        if(text.length > 35) return `<marquee scrollamount="3" class="block text-[9.5px] ${cls} uppercase w-full">${text}&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${text}</marquee>`;
        return `<span class="truncate block text-[9.5px] ${cls} uppercase w-full">${text}</span>`;
    };

    // HUD 1: SUTRAN
    if(datos.sutran && datos.sutran.length > 0) {
       let graves = counts.sutran.interrumpido + counts.sutran.restringido;

           let sCol = sEst.includes('INTERRUMPIDO') ? 'red' : (sEst.includes('RESTRINGIDO') ? 'amber' : 'green');

          let bBadge =

           if(document.getElementById('hud-sutran-badge')) document.getElementById('hud-sutran-badge').innerHTML = bBadge;

           // Inyectar Textos abajo alineados a la derecha
           let dDate = `<span class="text-[9px] font-console text-gray-400 leading-none uppercase flex items-center justify-end gap-1 w-full"><i class="fa-regular fa-clock"></i> ${estandarizarFecha(lastSutran['Fecha del evento'])}</span>`;
           let locSutran = (lastSutran['Carretera'] || '') + ' - ' + (lastSutran['Afectación'] || '');
           let row3 = `<span class="truncate block text-[11px] font-bold text-gray-800 dark:text-gray-200 leading-tight mt-1.5 mb-0.5 uppercase text-right w-full" title="${locSutran}">${locSutran}</span>`;
           let row4 = genMarquee(lastSutran['Evento'] || '-', 'text-gray-500 font-bold text-right');
           
           document.getElementById('hud-sutran-last').innerHTML = dDate + row3 + row4;
       }
    }

    // HUD 2: BOMBEROS
    if(datos.bomberos && datos.bomberos.length > 0) {
       let gravesCGBVP = counts.cgbvp.total - counts.cgbvp.cerrado;
       if(document.getElementById('hud-cgbvp-count')) document.getElementById('hud-cgbvp-count').innerText = gravesCGBVP;
       if(document.getElementById('hud-cgbvp-total')) document.getElementById('hud-cgbvp-total').innerText = "/ " + counts.cgbvp.total + " EN TOTAL";
       
       let lastB = datos.bomberos.find(r => r['Estado'].toUpperCase().includes('ATENDIENDO')) || datos.bomberos[0];
       if(document.getElementById('hud-cgbvp-last')) {
           let tFull = (lastB['Tipo de Emergencia'] || '').toUpperCase().replace(/</g, "&lt;").replace(/>/g, "&gt;");
           let pB = tFull.split('/');
           let tM = pB[0].trim();
           let tD = pB.slice(1).join(' / ').trim() || 'SIN DETALLE';
           
           let bTyp = 'INCENDIO'; let bC = 'red';
           if(tM.includes('ACC')) { bTyp = 'ACC. VEHICULAR'; bC='red'; }
           else if(tM.includes('MED')||tM.includes('MÉD')) { bTyp = 'EMERG. MÉDICA'; bC='amber'; }
           else if(tM.includes('MAT')||tM.includes('PEL')) { bTyp = 'MAT. PELIGROSOS'; bC='red'; }
           else if(tM.includes('RESC')) { bTyp = 'RESCATE'; bC='amber'; }
           else if(tM.includes('ESP')) { bTyp = 'SERV. ESPECIAL'; bC='amber'; }
           if(!lastB['Estado'].toUpperCase().includes('ATENDIENDO')) { bTyp = 'CERRADO'; bC='green'; }
           
          // Inyectar Badge Bomberos (Sombra adaptable)
          let bBadgeB =
          `<span class="bg-${bC}-500/10 text-${bC}-500 border border-${bC}-500/30 px-1.5 py-[1px] rounded text-[9px] font-console uppercase tracking-widest flex items-center gap-1.5 dark:shadow-[0_0_5px_rgba(0,0,0,0.5)]"><div class="w-1.5 h-1.5 rounded-full bg-${bC}-500 animate-pulse shadow-[0_0_4px_currentColor]"></div> ${bTyp}</span>`;
          if(document.getElementById('hud-cgbvp-badge')) document.getElementById('hud-cgbvp-badge').innerHTML = bBadgeB;

           let dDateB = `<span class="text-[9px] font-console text-gray-400 leading-none uppercase flex items-center justify-end gap-1 w-full"><i class="fa-regular fa-clock"></i> ${estandarizarFecha(lastB['Fecha y Hora'])}</span>`;
           let locB = (lastB['Direccion'] || '-').replace(/</g, "&lt;").replace(/>/g, "&gt;");
           let row3B = `<span class="truncate block text-[11px] font-bold text-gray-800 dark:text-gray-200 leading-tight mt-1.5 mb-0.5 uppercase text-right w-full" title="${locB}">${locB}</span>`;
           let row4B = genMarquee(tD, 'text-gray-500 font-bold text-right');
           
           document.getElementById('hud-cgbvp-last').innerHTML = dDateB + row3B + row4B;
       }
    }

    // HUD 3: IGP
    if(datos.igp && datos.igp.length > 0) {
       let lastIgp = datos.igp[0];
       let magVal = parseFloat(lastIgp['Magnitud']);
       let iCol = magVal >= 6.0 ? 'red' : (magVal >= 4.5 ? 'amber' : 'green');
       
       let elMag = document.getElementById('hud-igp-mag');
       if(elMag) {
           elMag.innerText = lastIgp['Magnitud'] || '-.-';
           elMag.className = `text-[36px] font-bold font-console leading-none block text-${iCol}-500`; 
       }
       if(document.getElementById('hud-igp-total')) document.getElementById('hud-igp-total').innerText = "/ " + counts.igp.total + " SISMOS";
       
       if(document.getElementById('hud-igp-last')) {
           let iEst = magVal >= 6.0 ? 'RIESGO ALTO' : (magVal >= 4.5 ? 'RIESGO MOD.' : 'RIESGO LEVE');
           
           let bBadgeI = `<span class="bg-${iCol}-500/10 text-${iCol}-500 border border-${iCol}-500/30 px-1.5 py-[1px] rounded text-[9px] font-console uppercase tracking-widest flex items-center gap-1.5 dark:shadow-[0_0_5px_rgba(0,0,0,0.5)]"><div class="w-1.5 h-1.5 rounded-full bg-${iCol}-500 animate-pulse shadow-[0_0_4px_currentColor]"></div> ${iEst}</span>`;
if(document.getElementById('hud-igp-badge')) document.getElementById('hud-igp-badge').innerHTML = bBadgeI;

           let dDateI = `<span class="text-[9px] font-console text-gray-400 leading-none uppercase flex items-center justify-end gap-1 w-full"><i class="fa-regular fa-clock"></i> ${estandarizarFecha(lastIgp['Fecha y Hora'])}</span>`;
           let locI = lastIgp['Referencia'] || '-';
           let row3I = `<span class="truncate block text-[11px] font-bold text-gray-800 dark:text-gray-200 leading-tight mt-1.5 mb-0.5 uppercase text-right w-full" title="${locI}">${locI}</span>`;
           let row4I = `<span class="truncate block text-[9.5px] text-gray-500 font-bold uppercase w-full text-right">INTENSIDAD: ${lastIgp['Intensidad'] || '-'}</span>`;
           
           document.getElementById('hud-igp-last').innerHTML = dDateI + row3I + row4I;
       }
    }

    // HUD 4: CECOM
    let cecomCardLast = document.getElementById('hud-cecom-last');
    if(cecomCardLast) {
       if(lastCecomMatched) {
           let cCol = (lastCecomMatched['Nivel Riesgo']||'').toUpperCase().includes('ALTO') ? 'red' : 'amber';
           let cEst = (lastCecomMatched['Tipo Evento']||'EVENTO').toUpperCase();
           let kF = Object.keys(lastCecomMatched).find(k => k.toLowerCase().includes('fecha'));
           let kU = Object.keys(lastCecomMatched).find(k => k.toLowerCase().includes('ubicaci'));
           let kD = Object.keys(lastCecomMatched).find(k => k.toLowerCase().includes('descrip'));
           
          let bBadgeC =
          `<span class="bg-${cCol}-500/10 text-${cCol}-500 border border-${cCol}-500/30 px-1.5 py-[1px] rounded text-[9px] font-console uppercase tracking-widest flex items-center gap-1.5 dark:shadow-[0_0_5px_rgba(0,0,0,0.5)]"><div class="w-1.5 h-1.5 rounded-full bg-${cCol}-500 animate-pulse shadow-[0_0_4px_currentColor]"></div> ${cEst}</span>`;
          if(document.getElementById('hud-cecom-badge')) document.getElementById('hud-cecom-badge').innerHTML = bBadgeC;

           let dDateC = `<span class="text-[9px] font-console text-gray-400 leading-none uppercase flex items-center justify-end gap-1 w-full"><i class="fa-regular fa-clock"></i> ${estandarizarFecha(kF ? lastCecomMatched[kF] : '-')}</span>`;
           let locC = kU ? lastCecomMatched[kU] : '-';
           let row3C = `<span class="truncate block text-[11px] font-bold text-gray-800 dark:text-gray-200 leading-tight mt-1.5 mb-0.5 uppercase text-right w-full" title="${locC}">${locC}</span>`;
           let descC = kD ? lastCecomMatched[kD] : '-';
           let row4C = genMarquee(descC, 'text-gray-500 font-bold text-right');
           
           cecomCardLast.innerHTML = dDateC + row3C + row4C;
       } else {
           cecomCardLast.innerHTML = '<span class="text-gray-500 text-[10px] uppercase text-right w-full block">Sin alertas registradas.</span>';
           if(document.getElementById('hud-cecom-badge')) document.getElementById('hud-cecom-badge').innerHTML = '';
       }
    }

    isFirstLoad = false;
  }

  // Estado inicial por defecto (VISITOR Público)
  //let currentUser = { nombre: 'Público', perfil: 'VISITOR', iniciales: 'PU' };

  function toggleUserMenu() {
      const menu = document.getElementById('user-dropdown');
      menu.classList.toggle('hidden');
  }

  function openLoginModal() {
      document.getElementById('user-dropdown').classList.add('hidden');
      document.getElementById('login-modal').classList.remove('hidden');
      document.getElementById('login-user').focus();
  }

  function closeLoginModal() {
      document.getElementById('login-modal').classList.add('hidden');
      document.getElementById('login-user').value = '';
      document.getElementById('login-pass').value = '';
  }

  function ejecutarLogin() {
      let user = document.getElementById('login-user').value.trim();
      let pass = document.getElementById('login-pass').value.trim();
      let btn = document.getElementById('btn-do-login');

      if(!user || !pass) return;

      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verificando...';
      btn.classList.add('pointer-events-none', 'opacity-70');

      google.script.run
        .withSuccessHandler(function(res) {
            btn.innerHTML = '<i class="fa-solid fa-unlock-keyhole"></i> Autenticar';
            btn.classList.remove('pointer-events-none', 'opacity-70');

            if(res.success) {
                // Actualizar estado global
                currentUser = { nombre: res.nombre, perfil: res.perfil, iniciales: res.iniciales };
                
                // Actualizar Textos del Menú
                document.getElementById('user-initials').innerText = currentUser.iniciales;
                document.getElementById('user-fullname').innerText = currentUser.nombre;
                document.getElementById('user-role-badge').innerText = "NIVEL: " + currentUser.perfil;
                
                // Alternar botones de Sesión
                document.getElementById('btn-login-trigger').classList.add('hidden');
                document.getElementById('btn-logout-trigger').classList.remove('hidden');
                
                // LÓGICA TÁCTICA: Mostrar botón "Añadir" solo si es ADMIN o USER
                let btnAdd = document.getElementById('menu-add-alert');
                if(currentUser.perfil === 'ADMIN' || currentUser.perfil === 'USER') {
                    btnAdd.classList.remove('hidden');
                } else {
                    btnAdd.classList.add('hidden');
                }
                
                closeLoginModal();
                Swal.fire({icon: 'success', title: 'Acceso Concedido', text: 'Bienvenido, ' + res.nombre, timer: 1500, showConfirmButton: false, background: isDarkMode ? '#171717' : '#fff', color: isDarkMode ? '#fff' : '#000'});
                
                let currentSidebarTitle = document.getElementById('sidebar-title').innerText;
                
            } else {
                Swal.fire({icon: 'error', title: 'Acceso Denegado', text: res.message, background: isDarkMode ? '#171717' : '#fff', color: isDarkMode ? '#fff' : '#000'});
            }
        })
        .validarSesion(user, pass);
  }

  function cerrarSesion() {
      // 1. Purgamos la memoria
      localStorage.removeItem('sam_active_session');
      localStorage.removeItem('sam_active_user_id');
      localStorage.removeItem('sam_show_welcome');

      // 2. Evasión del compilador: Desarmamos el '//' para que GAS no lo corte
      let protocolo = 'https:';
      let separador = '/' + '/'; 
      let dominio = 'rquisp3.github.io/SAM_/';
      
      let enlaceEscape = document.createElement('a');
      enlaceEscape.target = '_top';
      enlaceEscape.href = protocolo + separador + dominio;
      
      document.body.appendChild(enlaceEscape);
      enlaceEscape.click();
  }

  // Función de escape seguro para Google Apps Script
  function redireccionarAlLogin() {
      // Intentamos usar la URL base que ya tenemos en memoria
      if (typeof appUrlBase !== 'undefined' && appUrlBase !== '') {
          window.top.location.href = appUrlBase;
      } else {
          // Si no la tenemos, se la pedimos a GAS y saltamos
          google.script.run.withSuccessHandler(function(url) {
              window.top.location.href = url;
          }).getAppUrl();
      }
  }

  /* ==========================================
     4. ANIMACIONES Y UX DEL MAPA
     ========================================== */
  let marcadorAnimado = null;

  function triggerRadarPing(lat, lng, colorTailwind) {
    map.flyTo([lat, lng], 14, { animate: true, duration: 1.5 });
    if (marcadorAnimado) map.removeLayer(marcadorAnimado);

    let colorHex = '#22c55e';
    if (colorTailwind === 'red') colorHex = '#ef4444';
    else if (colorTailwind === 'yellow') colorHex = '#eab308';
    else if (colorTailwind === 'amber') colorHex = '#f59e0b';
    else if (colorTailwind === 'orange') colorHex = '#f97316';

    let customIcon = L.divIcon({ html: '<div class="radar-ping" style="background-color: ' + colorHex + ';"></div>', className: '', iconSize: [30, 30], iconAnchor: [15, 15] });
    marcadorAnimado = L.marker([lat, lng], { icon: customIcon }).addTo(map);
  }

  // ACCIÓN A: Cuando haces clic en un pin del MAPA
  function enfocarDesdeMapa(lat, lng, idAcordeon, colorTailwind, modulo) {
    openSidebar(modulo); // Abre el panel si estaba cerrado
    
    setTimeout(() => { // Pequeña pausa para asegurar que el panel terminó de abrirse
        document.querySelectorAll('.expand-content').forEach(el => el.classList.remove('open'));
        let content = document.getElementById(idAcordeon);
        
        if(content) {
            content.classList.add('open'); // Expande el detalle
            // Magia táctica: Scroll suave hasta la alerta específica
            content.parentElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            // =========================================================
            // NUEVO EFECTO VISUAL: PULSO PERIMETRAL DE 7 SEGUNDOS
            // =========================================================
            let card = content.parentElement;
            
            // 1. Identificamos el código hexadecimal exacto según el color de la alerta
            let glowColor = 'rgba(59, 130, 246, 0.8)'; // Azul base
            let borderColor = '#3b82f6';
            
            if (colorTailwind === 'red') { glowColor = 'rgba(239, 68, 68, 0.8)'; borderColor = '#ef4444'; }
            else if (colorTailwind === 'amber') { glowColor = 'rgba(245, 158, 11, 0.8)'; borderColor = '#f59e0b'; }
            else if (colorTailwind === 'yellow') { glowColor = 'rgba(234, 179, 8, 0.8)'; borderColor = '#eab308'; }
            else if (colorTailwind === 'green') { glowColor = 'rgba(34, 197, 94, 0.8)'; borderColor = '#22c55e'; }
            else if (colorTailwind === 'orange') { glowColor = 'rgba(249, 115, 22, 0.8)'; borderColor = '#f97316'; }

            // 2. Inyectamos las variables CSS dinámicas a la tarjeta
            card.style.setProperty('--glow-c', glowColor);
            card.style.setProperty('--border-c', borderColor);
            
            // 3. Encendemos el motor de pulso (añadiendo la clase del CSS)
            card.classList.add('card-focus-active');
            
            // 4. Apagamos el sistema a los 7 SEGUNDOS (7000 ms) exactos
            setTimeout(() => { 
                card.classList.remove('card-focus-active');
                card.style.removeProperty('--glow-c');
                card.style.removeProperty('--border-c');
            }, 7000);
            // =========================================================
        }
    }, 300); 

    triggerRadarPing(lat, lng, colorTailwind);
  }

  // ACCIÓN B: Cuando haces clic en la lista del SIDEBAR
  function clickDesdeSidebar(lat, lng, idAcordeon, colorTailwind) {
    let content = document.getElementById(idAcordeon);
    let isOpening = !content.classList.contains('open');

    document.querySelectorAll('.expand-content').forEach(el => el.classList.remove('open'));

    if(isOpening) {
        content.classList.add('open');
        triggerRadarPing(lat, lng, colorTailwind);
        if (window.innerWidth < 768) closeSidebar(); // En móviles cierra el panel para ver el radar
    }
  }

  /* ==========================================
     MOTOR METEOROLÓGICO: FLUJO DE VIENTO (OPACIDAD FIX)
     ========================================== */
  function toggleWindLayer() {
      layerState['WIND_FLOW'] = !layerState['WIND_FLOW'];
      
      // Si se apaga, removemos del mapa y cambiamos el color al instante
      if (!layerState['WIND_FLOW']) {
          if (windLayer && map.hasLayer(windLayer)) { map.removeLayer(windLayer); }
          if (typeof syncQuickButtons === 'function') syncQuickButtons();
          return;
      }

      // Si ya estaba descargado, lo mostramos y cambiamos el color
      if (windLayer) {
          windLayer.addTo(map);
          if (typeof syncQuickButtons === 'function') syncQuickButtons();
          return;
      }

      if (isWindLoading) return;
      isWindLoading = true;
      
      Swal.fire({ title: 'Conectando a Satélite...', text: 'Descargando malla vectorial GFS.', allowOutsideClick: false, showConfirmButton: false, timer: 1500, background: isDarkMode ? '#171717' : '#fff', color: isDarkMode ? '#fff' : '#000' });

      if (!map.getPane('windPane')) {
          map.createPane('windPane');
          map.getPane('windPane').style.zIndex = 250; 
          map.getPane('windPane').style.pointerEvents = 'none'; 
      }

      fetch("https://onaci.github.io/leaflet-velocity/wind-global.json")
          .then(response => response.json())
          .then(data => {
              windLayer = L.velocityLayer({
                  pane: 'windPane',       
                  displayValues: true,
                  displayOptions: { velocityType: 'Viento Global', position: 'bottomright', emptyString: 'Sin datos', speedUnit: 'm/s' },
                  data: data, maxVelocity: 15, lineWidth: 2.5, velocityScale: 0.004, particleAge: 45, particleMultiplier: 1 / 4000, 
                  colorScale: [ "rgba(255, 255, 255, 0.85)", "rgba(224, 242, 254, 0.85)", "rgba(186, 230, 253, 0.90)", "rgba(253, 230, 138, 0.90)", "rgba(252, 165, 165, 0.95)" ]
              });
              isWindLoading = false;
              if (layerState['WIND_FLOW']) windLayer.addTo(map);
              if (typeof syncQuickButtons === 'function') syncQuickButtons(); // Fuerza el color ON
          })
          .catch(err => {
              isWindLoading = false;
              layerState['WIND_FLOW'] = false;
              Swal.fire({ icon: 'error', title: 'Error', text: 'Conexión GFS rechazada.', background: isDarkMode ? '#171717' : '#fff', color: isDarkMode ? '#fff' : '#000' });
              if (typeof syncQuickButtons === 'function') syncQuickButtons(); // Fuerza el color OFF
          });
  }

              listContainer.innerHTML = '<div class="text-center text-gray-500 font-console text-xs mt-10">NO SE DETECTARON CÁMARAS ACTIVAS</div>';
              return;
          }

          let htmlList = '';
          
          camaras.forEach((cam, index) => {
              let itemId = 'cam-item-' + index;
              
              // A) DIBUJAR MARCADOR EN EL MAPA (Diseño Cyan adaptativo Light/Dark)
              if(cam.lat && cam.lng) {
                  // DISEÑO TÁCTICO INTEGRADO (Filosofía SAM_)

                  let iconCCTV = L.divIcon({
                      html: `

                      iconAnchor: [10, 10]
                  });

                  let marker = L.marker([parseFloat(cam.lat), parseFloat(cam.lng)], {icon: iconCCTV, zIndexOffset: 700}).addTo(layerCCTV);
                  marker.bindTooltip(`
                    <b class="font-sans text-[10px] uppercase text-cyan-500">${cam.ubicacion}</b><br>
                    <span class="text-[9px] dark:text-gray-300">INTERCEPTAR SEÑAL CCTV</span>`,

          // FIX TÁCTICO: Solo dibujar en el mapa si la capa está encendida en layerState

          if(globalCounts) buildLayerPanel(globalCounts);

  // 4. MOTOR HLS (El reproductor)
  function reproducirVideoHLS(url) {
      let video = document.getElementById('cctv-player');
      let loader = document.getElementById('cctv-loader');
      let placeholder = document.getElementById('cctv-placeholder');

      // Preparar interfaz
      placeholder.classList.add('hidden');
      video.classList.remove('hidden');
      loader.classList.remove('hidden');

      if (Hls.isSupported()) {
          if (hlsPlayer) { hlsPlayer.destroy(); }
          hlsPlayer = new Hls();
          hlsPlayer.loadSource(url);
          hlsPlayer.attachMedia(video);
          
          hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function() {
              video.play();
              loader.classList.add('hidden');
          });
          
          hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
              if (data.fatal) {
                  loader.classList.add('hidden');
                  placeholder.innerText = "ERROR EN TRANSMISIÓN (SEÑAL CAÍDA O RESTRINGIDA)";
                  placeholder.classList.remove('hidden');
                  video.classList.add('hidden');
              }
          });
      }
  }

  function applyLayerFilters() {
      markerGroup.clearLayers();
      
      if (heatLayer) { map.removeLayer(heatLayer); heatLayer = null; }
      
      let heatPoints = []; 

      allMarkers.forEach(item => {
          if (layerState[item.layerId]) {
              item.marker.addTo(markerGroup);
              
              if (layerState['HEATMAP'] && item.layerId !== 'SEDES') {
                  let latlng = item.marker.getLatLng();
                  heatPoints.push([latlng.lat, latlng.lng, 1]); 
              }
          }
      });

      // Dibujamos la capa térmica si hay puntos
      if (layerState['HEATMAP'] && heatPoints.length > 0) {
          try {
              heatLayer = L.heatLayer(heatPoints, {
                  radius: 20,      
                  blur: 25,        
                  maxZoom: 10,     
                  gradient: { 0.3: '#3b82f6', 0.5: '#22c55e', 0.7: '#eab308', 1.0: '#ef4444' }
              }).addTo(map);
          } catch(e) { console.error("Error cargando Heatmap:", e); }
      }
      
      // VITAL: Ejecutar la sincronización de colores al final de los filtros
      if (typeof syncQuickButtons === 'function') {
          syncQuickButtons();
      }
  }

  /* =========================================================
   MOTOR DE ASIGNACIÓN ESPACIAL (MACROZONAS PERÚ v4.1 - DERECHA A IZQUIERDA)
   ========================================================= */
function clasificarUbicacion(textoRef, lat, lng) {
    const diccionario = [
        { zona: 'COSTA NORTE', regiones: ['TUMBES', 'PIURA', 'LAMBAYEQUE', 'LA LIBERTAD', 'TALARA', 'PAITA', 'SALAVERRY', 'CHICLAYO', 'TRUJILLO'], lat: -6.77, lng: -79.84, ref: 'LAMBAYEQUE' },
        { zona: 'COSTA CENTRO', regiones: ['ANCASH', 'LIMA', 'CALLAO', 'ICA', 'CHIMBOTE', 'SUPE', 'HUACHO', 'PISCO', 'SAN JUAN', 'CAÑETE', 'HUARMEY'], lat: -12.04, lng: -77.02, ref: 'LIMA' },
        { zona: 'COSTA SUR', regiones: ['AREQUIPA', 'MOQUEGUA', 'TACNA', 'MATARANI', 'ILO'], lat: -16.39, lng: -71.53, ref: 'AREQUIPA' },
        { zona: 'SIERRA NORTE', regiones: ['CAJAMARCA', 'CHOTA', 'JAEN'], lat: -7.16, lng: -78.51, ref: 'CAJAMARCA' },
        { zona: 'SIERRA CENTRO', regiones: ['HUANUCO', 'PASCO', 'JUNIN', 'HUANCAVELICA', 'AYACUCHO', 'HUANCAYO', 'TARMA'], lat: -11.15, lng: -75.99, ref: 'JUNÍN' },
        { zona: 'SIERRA SUR', regiones: ['APURIMAC', 'CUSCO', 'PUNO', 'ABANCAY', 'JULIACA'], lat: -13.52, lng: -71.96, ref: 'CUSCO' },
        { zona: 'SELVA NORTE', regiones: ['AMAZONAS', 'LORETO', 'SAN MARTIN', 'IQUITOS', 'TARAPOTO', 'MOYOBAMBA', 'YURIMAGUAS'], lat: -3.74, lng: -73.25, ref: 'LORETO' },
        { zona: 'SELVA CENTRO', regiones: ['UCAYALI', 'PUCALLPA'], lat: -8.37, lng: -74.55, ref: 'UCAYALI' },
        { zona: 'SELVA SUR', regiones: ['MADRE DE DIOS', 'PUERTO MALDONADO'], lat: -12.59, lng: -69.18, ref: 'MADRE DE DIOS' }
    ];

    let pLat = parseFloat(lat);
    let pLng = parseFloat(lng);
    
    // 1. PRIORIDAD ABSOLUTA: COORDENADAS
    if (!isNaN(pLat) && !isNaN(pLng) && pLat !== 0 && pLng !== 0) {
        let zonaCercana = 'COSTA CENTRO';
        let regionCercana = 'LIMA';
        let distMinima = 999999;
        diccionario.forEach(d => {
            let dist = Math.sqrt(Math.pow(pLat - d.lat, 2) + Math.pow(pLng - d.lng, 2));
            if (dist < distMinima) { distMinima = dist; zonaCercana = d.zona; regionCercana = d.ref; }
        });
        return { zona: zonaCercana, region: regionCercana };
    }

    // 2. BÚSQUEDA TEXTUAL (Buscando desde el final hacia el inicio)
    let txt = String(textoRef || '').toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
    let matches = [];

    for (let i = 0; i < diccionario.length; i++) {
        for(let j = 0; j < diccionario[i].regiones.length; j++) {
            let kw = diccionario[i].regiones[j];
            let regex = new RegExp("\\b" + kw + "\\b", "g");
            let match;
            while ((match = regex.exec(txt)) !== null) {
                // Guardamos el índice donde encontró la palabra
                matches.push({ zona: diccionario[i].zona, region: kw, index: match.index });
            }
        }
    }

    if (matches.length > 0) {
        // ORDEN TÁCTICO: La palabra que esté más a la derecha en la dirección gana (Ej: Gana ICA sobre Chiclayo)
        matches.sort((a, b) => b.index - a.index);
        return { zona: matches[0].zona, region: matches[0].region };
    }

    return { zona: 'COSTA CENTRO', region: 'LIMA' };
}
